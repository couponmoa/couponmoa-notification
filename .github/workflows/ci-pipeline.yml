name: CI Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # application-pord.yml 파일을 깃허브 시크릿에서 가져옴
      - name: Create application-prod.yml file
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_PROD_YML }}" > src/main/resources/application-prod.yml

      # gradlew 테스트 빌드
      - name: Run tests
        run: |
          chmod +x ./gradlew
          ./gradlew clean test

      # gradlew 테스트 없이 빌드
      - name: Build Spring Boot App (without test)
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test